<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🏀 Knicks Finals Drinking Game</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #08080e;
  color: #f0f0f0;
  min-height: 100vh;
  overflow-x: hidden;
}
#splash {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1.2rem;
  padding: 2rem 1rem;
  text-align: center;
}
.splash-glow { font-size: 4rem; line-height: 1; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
.splash-title { font-size: clamp(1.6rem,5vw,2.2rem); font-weight: 800; color: #fff; letter-spacing: -0.03em; line-height: 1.1; }
.splash-subtitle { color: #666; font-size: 0.9rem; }
.connecting-card {
  background: #141418; border: 1px solid #2a2a35; border-radius: 16px;
  padding: 1.5rem 2rem; width: 100%; max-width: 340px;
  display: flex; flex-direction: column; align-items: center; gap: 0.8rem;
}
.spinner { width: 32px; height: 32px; border: 3px solid #2a2a35; border-top-color: #f56a00; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.connecting-text { font-size: 0.85rem; color: #888; }
.connecting-text strong { color: #f56a00; }

#app { display: none; flex-direction: column; min-height: 100vh; }
#app.visible { display: flex; }

.header { background: #0f0f14; border-bottom: 1px solid #1e1e28; padding: 0 1rem; position: sticky; top: 0; z-index: 20; }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 0.7rem 0; gap: 8px; }
.teams-score { display: flex; align-items: center; gap: 8px; }
.badge { font-size: 0.78rem; font-weight: 800; letter-spacing: 0.05em; padding: 4px 9px; border-radius: 6px; }
.nyk { background: #003da5; color: #f58426; }
.sas { background: #c4ced4; color: #111; }
.score { font-size: 1.3rem; font-weight: 800; color: #fff; display: flex; align-items: center; gap: 6px; min-width: 90px; justify-content: center; }
.score-sep { color: #333; font-weight: 300; }
.status-pill { font-size: 0.62rem; font-weight: 700; padding: 3px 9px; border-radius: 20px; letter-spacing: 0.07em; text-transform: uppercase; white-space: nowrap; display: flex; align-items: center; gap: 4px; }
.dot { width: 5px; height: 5px; border-radius: 50%; }
.s-connecting { background: #1a1a24; color: #666; border: 1px solid #333; }
.s-connecting .dot { background: #666; }
.s-waiting { background: #0d1a2e; color: #4a9eff; border: 1px solid #1a4a8a; }
.s-waiting .dot { background: #4a9eff; animation: blink 1.5s ease-in-out infinite; }
.s-live { background: #1a0a00; color: #f56a00; border: 1px solid #f56a00; }
.s-live .dot { background: #f56a00; animation: blink 1s ease-in-out infinite; }
.s-error { background: #1a0808; color: #ff5555; border: 1px solid #7a1a1a; }
.s-error .dot { background: #ff5555; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.header-meta { display: flex; align-items: center; justify-content: space-between; padding: 0 0 0.5rem; font-size: 0.7rem; color: #555; }
.poll-bar { height: 2px; background: #1a1a24; }
.poll-fill { height: 100%; background: #f56a00; width: 0%; transition: width 10s linear; }

.body { flex: 1; display: flex; flex-direction: column; max-width: 640px; margin: 0 auto; width: 100%; padding: 0.8rem; gap: 0.8rem; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.stat-box { background: #141418; border: 1px solid #1e1e28; border-radius: 10px; padding: 0.55rem 0.4rem; text-align: center; }
.stat-n { font-size: 1.4rem; font-weight: 800; color: #fff; line-height: 1; }
.stat-l { font-size: 0.58rem; color: #555; text-transform: uppercase; letter-spacing: 0.05em; margin-top: 3px; font-weight: 600; }

.test-label { font-size: 0.68rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.test-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
@media (min-width: 420px) { .test-grid { grid-template-columns: repeat(3, 1fr); } }
.test-btn { background: #141418; border: 1px solid #2a2a35; border-radius: 8px; color: #aaa; cursor: pointer; font-size: 0.72rem; font-weight: 600; padding: 7px 8px; text-align: center; transition: all 0.15s; line-height: 1.3; }
.test-btn:hover { border-color: #f56a00; color: #f56a00; background: #1a0f00; }
.test-btn:active { transform: scale(0.96); }
.test-btn .t-icon { font-size: 1rem; display: block; margin-bottom: 2px; }

.tabs { display: flex; gap: 4px; background: #141418; border: 1px solid #1e1e28; border-radius: 10px; padding: 4px; }
.tab { flex: 1; background: none; border: none; border-radius: 7px; color: #555; cursor: pointer; font-size: 0.75rem; font-weight: 600; padding: 6px; transition: all 0.15s; text-align: center; }
.tab.active { background: #2a2a35; color: #f0f0f0; }

#feed-panel, #log-panel { display: none; }
#feed-panel.visible, #log-panel.visible { display: block; }

.alert-feed { display: flex; flex-direction: column; gap: 7px; }
.alert-card { background: #141418; border-radius: 12px; padding: 0.8rem 0.9rem; border-left: 3px solid #f56a00; animation: slideIn 0.25s ease; }
.alert-card.ac-flipcup { border-left-color: #ff2d55; background: #180010; }
.alert-card.ac-communal { border-left-color: #ff9500; background: #180e00; }
.alert-card.ac-quarter { border-left-color: #a259ff; background: #100018; }
.alert-card.ac-test { border-left-color: #30c060; border-style: dashed; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.alert-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.alert-rules { display: flex; flex-direction: column; gap: 3px; flex: 1; }
.alert-rule { font-size: 0.88rem; font-weight: 600; color: #f0f0f0; display: flex; align-items: center; gap: 5px; line-height: 1.3; }
.alert-icon { font-size: 1rem; flex-shrink: 0; }
.alert-time { font-size: 0.65rem; color: #444; white-space: nowrap; margin-top: 2px; }
.alert-play { font-size: 0.7rem; color: #555; margin-top: 5px; font-style: italic; }
.bonus-banner { margin-top: 6px; padding: 5px 10px; border-radius: 7px; font-size: 0.8rem; font-weight: 700; text-align: center; }
.b-flip { background: #300018; color: #ff2d55; }
.b-comm { background: #281400; color: #ff9500; }
.empty-state { text-align: center; padding: 3rem 1rem; color: #333; font-size: 0.85rem; }
.empty-state .ei { font-size: 2rem; margin-bottom: 6px; }

.log-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
.log-table th { text-align: left; color: #444; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.07em; padding: 0 6px 6px; font-weight: 700; border-bottom: 1px solid #1e1e28; }
.log-table td { padding: 7px 6px; border-bottom: 1px solid #141418; vertical-align: top; color: #aaa; }
.log-table tr:last-child td { border-bottom: none; }
.log-event { color: #f0f0f0; font-weight: 500; }
.log-action { color: #f56a00; font-weight: 600; }
.log-action.la-flip { color: #ff2d55; }
.log-action.la-comm { color: #ff9500; }
.log-action.la-quarter { color: #a259ff; }
.log-action.la-test { color: #30c060; }
.log-badge { display: inline-block; background: #1a1a24; border-radius: 4px; padding: 1px 5px; font-size: 0.6rem; color: #666; margin-left: 4px; }

.err-banner { background: #1a0808; border: 1px solid #5a1a1a; border-radius: 9px; color: #ff6b6b; font-size: 0.78rem; padding: 0.65rem 0.9rem; line-height: 1.5; }

#flash { position: fixed; inset: 0; pointer-events: none; z-index: 999; opacity: 0; }
#flash.pop { animation: flashPop 0.7s ease forwards; }
@keyframes flashPop { 0%{opacity:0.5} 100%{opacity:0} }
</style>
</head>
<body>
<div id="flash"></div>

<div id="splash">
  <div class="splash-glow">🏀</div>
  <div class="splash-title">Knicks Finals<br>Drinking Game</div>
  <div class="splash-subtitle">2025 NBA Finals · NYK vs SAS</div>
  <div class="connecting-card">
    <div class="spinner"></div>
    <div class="connecting-text" id="splash-text">Connecting to <strong>NYK vs SAS</strong>…</div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-top">
      <div class="teams-score">
        <span class="badge nyk">NYK</span>
        <div class="score">
          <span id="score-nyk">—</span>
          <span class="score-sep">–</span>
          <span id="score-sas">—</span>
        </div>
        <span class="badge sas">SAS</span>
      </div>
      <div id="status-pill" class="status-pill s-connecting">
        <span class="dot"></span>
        <span id="status-text">Connecting</span>
      </div>
    </div>
    <div class="header-meta">
      <div><span id="quarter-label">—</span> &nbsp; <span id="clock-label">—</span></div>
      <span id="last-poll-label">—</span>
    </div>
  </div>
  <div class="poll-bar"><div class="poll-fill" id="poll-fill"></div></div>

  <div class="body">
    <div id="err-area"></div>

    <div class="stats-row">
      <div class="stat-box"><div class="stat-n" id="sn-alerts">0</div><div class="stat-l">Alerts</div></div>
      <div class="stat-box"><div class="stat-n" id="sn-drinks">0</div><div class="stat-l">Drinks</div></div>
      <div class="stat-box"><div class="stat-n" id="sn-combos">0</div><div class="stat-l">Combos</div></div>
      <div class="stat-box"><div class="stat-n" id="sn-shots">0</div><div class="stat-l">Shots</div></div>
    </div>

    <div>
      <div class="test-label">Test alerts</div>
      <div class="test-grid">
        <button class="test-btn" onclick="testAlert('steal')"><span class="t-icon">🫳</span>Knicks steal</button>
        <button class="test-btn" onclick="testAlert('block')"><span class="t-icon">🚫</span>Knicks block</button>
        <button class="test-btn" onclick="testAlert('bridges')"><span class="t-icon">🎯</span>Bridges 3-ptr</button>
        <button class="test-btn" onclick="testAlert('dunk')"><span class="t-icon">🏀</span>Knicks dunk</button>
        <button class="test-btn" onclick="testAlert('combo2')"><span class="t-icon">🎲</span>2-rule combo</button>
        <button class="test-btn" onclick="testAlert('combo3')"><span class="t-icon">🏆</span>3-rule combo</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" id="tab-feed" onclick="switchTab('feed')">Live Alerts</button>
      <button class="tab" id="tab-log" onclick="switchTab('log')">Event Log</button>
    </div>

    <div id="feed-panel" class="visible">
      <div class="alert-feed" id="alert-feed">
        <div class="empty-state" id="empty-state"><div class="ei">📡</div><div>Waiting for game action…</div></div>
      </div>
    </div>

    <div id="log-panel">
      <table class="log-table">
        <thead><tr><th style="width:60px">Time</th><th>Event</th><th style="width:110px">Action</th></tr></thead>
        <tbody id="log-body"></tbody>
      </table>
      <div class="empty-state" id="log-empty"><div class="ei">📋</div><div>No events yet</div></div>
    </div>
  </div>
</div>

<script>
const POLL_MS = 10000;

let seenPlayIds = new Set();
let robinsonFTTracker = {};
let lastKnownQuarter = null;
let totalPlaysProcessed = 0;
let alertCount = 0, drinkCount = 0, comboCount = 0, shotCount = 0;
let logRows = [];

function setStatus(state) {
  const pill = document.getElementById('status-pill');
  const txt = document.getElementById('status-text');
  pill.className = 'status-pill';
  const map = {
    connecting: ['s-connecting','Connecting'],
    waiting:    ['s-waiting','Waiting for tipoff'],
    live:       ['s-live','Live'],
    error:      ['s-error','Error'],
  };
  const [cls, label] = map[state] || map.connecting;
  pill.classList.add(cls);
  txt.textContent = label;
}

function showApp() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('app').classList.add('visible');
}

function evaluatePlay(play) {
  const triggers = [];
  const desc = (play.description || '').toLowerCase();
  const team = (play.team?.abbreviation || play.team?.alias || '').toUpperCase();
  const playerName = (play.player?.full_name || play.player?.name || '').toLowerCase();
  const eventType = (play.event_type || play.play_type || play.type || '').toLowerCase();
  const isKnicks = team === 'NYK';
  const isSpurs  = team === 'SAS';

  if (isKnicks && (eventType.includes('block') || desc.includes('blocks')))
    triggers.push({ icon:'🚫', msg:'Knicks BLOCK — drink for 5 seconds!', action:'Drink 5s' });
  if (isKnicks && (eventType.includes('steal') || desc.includes('steals')))
    triggers.push({ icon:'🫳', msg:'Knicks STEAL — drink for 5 seconds!', action:'Drink 5s' });
  if (isKnicks && (desc.includes('dunk') || eventType.includes('dunk')))
    triggers.push({ icon:'🏀', msg:'Knicks DUNK — CHEERS, CHUG IT!', action:'Chug' });

  if (playerName.includes('mikal bridges')) {
    const isThree = desc.includes('3pt') || desc.includes('three') || desc.includes('3-pointer') || eventType.includes('three_point');
    const isMade  = !desc.includes('misses') && !desc.includes('missed');
    if (isThree && isMade)
      triggers.push({ icon:'🎯', msg:'Mikal Bridges hits a THREE — drink for 3 seconds!', action:'Drink 3s' });
  }

  if (playerName.includes('mitchell robinson') && (eventType.includes('free_throw') || desc.includes('free throw'))) {
    const isMade = !desc.includes('misses') && !desc.includes('missed');
    const seqKey = play.possession_id || (play.period + '_' + Math.floor((play.clock_decimal || 0) / 30));
    if (isMade) {
      if (!robinsonFTTracker[seqKey]) robinsonFTTracker[seqKey] = { made: 0 };
      robinsonFTTracker[seqKey].made++;
      const ofMatch = desc.match(/(\d+)\s+of\s+(\d+)/);
      if (ofMatch) {
        const attempt = parseInt(ofMatch[1]), total = parseInt(ofMatch[2]);
        if (total >= 2 && attempt === total && robinsonFTTracker[seqKey].made >= 2)
          triggers.push({ icon:'🥃', msg:'Robinson makes BOTH free throws — full shot!', action:'Full shot' });
        else if (total === 1 || attempt < total)
          triggers.push({ icon:'🍼', msg:'Robinson makes a free throw — baby shot!', action:'Baby shot' });
      } else {
        triggers.push({ icon:'🍼', msg:'Robinson makes a free throw — baby shot!', action:'Baby shot' });
      }
    }
  }

  if (isSpurs && (eventType.includes('free_throw') || desc.includes('free throw')) &&
      (desc.includes('misses') || desc.includes('missed') || eventType.includes('missed')))
    triggers.push({ icon:'🤦', msg:'Spurs MISS a free throw — drink!', action:'Drink' });

  if (isKnicks && (desc.includes('and 1') || desc.includes('and-1') || desc.includes('and one')))
    triggers.push({ icon:'✊', msg:'Knicks AND-1 — drink!', action:'Drink' });

  const foulMatch = desc.match(/(\d+)(st|nd|rd|th)\s+(personal\s+)?foul/i);
  if (foulMatch && parseInt(foulMatch[1]) === 3)
    triggers.push({ icon:'⚠️', msg:`${play.player?.full_name || 'Player'} — 3rd foul! Drink 3 seconds!`, action:'Drink 3s' });

  if (desc.includes('technical') || desc.includes('flagrant') || eventType.includes('technical') || eventType.includes('flagrant'))
    triggers.push({ icon:'🎱', msg:'TECHNICAL / FLAGRANT FOUL — roulette shot!', action:'Roulette shot' });

  return triggers;
}

function renderAlert(triggers, playDesc, isQuarter, quarterNum, isTest) {
  const feed = document.getElementById('alert-feed');
  const empty = document.getElementById('empty-state');
  if (empty) empty.remove();

  const now = new Date();
  const timeStr = now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const card = document.createElement('div');
  let logAction = '', logActionClass = '';

  if (isQuarter) {
    card.className = 'alert-card ac-quarter';
    card.innerHTML = `<div class="alert-top"><div class="alert-rule"><span class="alert-icon">🔔</span> End of Q${quarterNum} — everyone takes a SHOT!</div><span class="alert-time">${timeStr}</span></div>`;
    drinkCount++; shotCount++;
    logAction = 'Shot 🥃'; logActionClass = 'la-quarter';
    addLogRow(timeStr, `End of Q${quarterNum}`, logAction, logActionClass);
  } else {
    const count = triggers.length;
    card.className = 'alert-card' + (isTest ? ' ac-test' : count >= 3 ? ' ac-flipcup' : count === 2 ? ' ac-communal' : '');
    const rulesHTML = triggers.map(t => `<div class="alert-rule"><span class="alert-icon">${t.icon}</span> ${t.msg}</div>`).join('');
    let bonusHTML = '';
    if (count >= 3) {
      bonusHTML = `<div class="bonus-banner b-flip">🏆 3+ RULES — FLIP CUP TIME!!</div>`;
      drinkCount += 3; comboCount++; shotCount++;
      logAction = 'FLIP CUP 🏆'; logActionClass = 'la-flip';
    } else if (count === 2) {
      bonusHTML = `<div class="bonus-banner b-comm">🎲 2 rules hit — ONE COMMUNAL SHOT!</div>`;
      drinkCount += 2; comboCount++;
      logAction = 'Communal shot 🎲'; logActionClass = 'la-comm';
    } else {
      drinkCount++;
      logAction = triggers[0]?.action || 'Drink';
      logActionClass = isTest ? 'la-test' : '';
    }
    const shortDesc = playDesc ? playDesc.slice(0, 90) + (playDesc.length > 90 ? '…' : '') : '';
    card.innerHTML = `
      <div class="alert-top">
        <div class="alert-rules">${rulesHTML}</div>
        <span class="alert-time">${timeStr}${isTest ? ' · TEST' : ''}</span>
      </div>
      ${shortDesc ? `<div class="alert-play">${shortDesc}</div>` : ''}
      ${bonusHTML}`;
    const eventLabel = triggers.map(t => t.msg.split('—')[0].trim()).join(' + ');
    const testBadge = isTest ? '<span class="log-badge">TEST</span>' : '';
    addLogRow(timeStr, eventLabel + testBadge, logAction, logActionClass);
  }

  feed.insertBefore(card, feed.firstChild);
  alertCount++;
  document.getElementById('sn-alerts').textContent = alertCount;
  document.getElementById('sn-drinks').textContent = drinkCount;
  document.getElementById('sn-combos').textContent = comboCount;
  document.getElementById('sn-shots').textContent = shotCount;
  flashScreen(isTest ? '#30c060' : isQuarter ? '#a259ff' : triggers.length >= 3 ? '#ff2d55' : '#f56a00');
  playBeep(triggers.length >= 3 ? 'epic' : isQuarter ? 'quarter' : 'normal');
}

function addLogRow(time, event, action, actionClass) {
  document.getElementById('log-empty').style.display = 'none';
  const tbody = document.getElementById('log-body');
  const tr = document.createElement('tr');
  tr.innerHTML = `<td style="color:#444;white-space:nowrap">${time}</td><td class="log-event">${event}</td><td class="log-action ${actionClass}">${action}</td>`;
  tbody.insertBefore(tr, tbody.firstChild);
  logRows.push({ time, event, action });
  if (logRows.length > 200) { tbody.removeChild(tbody.lastChild); logRows.shift(); }
}

const TEST_SCENARIOS = {
  steal:   [{ icon:'🫳', msg:'Knicks STEAL — drink for 5 seconds!', action:'Drink 5s' }],
  block:   [{ icon:'🚫', msg:'Knicks BLOCK — drink for 5 seconds!', action:'Drink 5s' }],
  bridges: [{ icon:'🎯', msg:'Mikal Bridges hits a THREE — drink for 3 seconds!', action:'Drink 3s' }],
  dunk:    [{ icon:'🏀', msg:'Knicks DUNK — CHEERS, CHUG IT!', action:'Chug' }],
  combo2:  [{ icon:'🚫', msg:'Knicks BLOCK — drink for 5 seconds!', action:'Drink 5s' }, { icon:'🫳', msg:'Knicks STEAL — drink for 5 seconds!', action:'Drink 5s' }],
  combo3:  [{ icon:'🏀', msg:'Knicks DUNK — CHEERS, CHUG IT!', action:'Chug' }, { icon:'✊', msg:'Knicks AND-1 — drink!', action:'Drink' }, { icon:'🎯', msg:'Mikal Bridges hits a THREE — drink for 3 seconds!', action:'Drink 3s' }],
};
function testAlert(key) { renderAlert(TEST_SCENARIOS[key], `[TEST] ${key} scenario`, false, 0, true); }

function switchTab(name) {
  document.getElementById('feed-panel').classList.toggle('visible', name === 'feed');
  document.getElementById('log-panel').classList.toggle('visible', name === 'log');
  document.getElementById('tab-feed').classList.toggle('active', name === 'feed');
  document.getElementById('tab-log').classList.toggle('active', name === 'log');
}

function flashScreen(color) {
  const el = document.getElementById('flash');
  el.style.background = color;
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
}

function playBeep(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const freqs = type === 'epic' ? [440,554,659,880] : type === 'quarter' ? [523,659,784] : [659,784];
    freqs.forEach((freq, i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      const t = ctx.currentTime + i * 0.12;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.15, t + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
      osc.start(t); osc.stop(t + 0.3);
    });
  } catch(e) {}
}

function animatePollBar() {
  const fill = document.getElementById('poll-fill');
  fill.style.transition = 'none'; fill.style.width = '0%';
  void fill.offsetWidth;
  fill.style.transition = `width ${POLL_MS/1000}s linear`; fill.style.width = '100%';
}

async function pollGame() {
  animatePollBar();
  try {
    const res = await fetch('/api/pbp');
    document.getElementById('last-poll-label').textContent = `Last poll: ${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;

    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      showError(body.error || `Server error ${res.status}`);
      setStatus('error'); return;
    }

    clearError();
    const data = await res.json();
    const gameStatus = (data?.status || data?.game?.status || '').toLowerCase();
    const periods = data?.periods || data?.game?.periods || [];

    const home = data?.home || data?.game?.home;
    const away = data?.away || data?.game?.away;
    if (home && away) {
      const nyk = (home.alias==='NYK'||home.abbreviation==='NYK') ? home : away;
      const sas = (home.alias==='SAS'||home.abbreviation==='SAS') ? home : away;
      document.getElementById('score-nyk').textContent = nyk?.points ?? '—';
      document.getElementById('score-sas').textContent = sas?.points ?? '—';
    }

    if (gameStatus === 'inprogress' || gameStatus === 'halftime') setStatus('live');
    else if (gameStatus === 'scheduled' || gameStatus === 'created') setStatus('waiting');
    else if (gameStatus === 'closed' || gameStatus === 'complete') setStatus('waiting');

    if (!periods.length) return;

    const currentPeriod = periods[periods.length - 1];
    const currentQ = currentPeriod?.number || currentPeriod?.id || 1;
    const qLabels = {1:'Q1',2:'Q2',3:'Q3',4:'Q4'};
    document.getElementById('quarter-label').textContent = qLabels[currentQ] || `OT${currentQ-4}`;
    const lastEvent = currentPeriod?.events?.[currentPeriod.events.length - 1];
    if (lastEvent?.clock) document.getElementById('clock-label').textContent = lastEvent.clock;

    const periodStatus = (currentPeriod?.period_status || currentPeriod?.status || '').toLowerCase();
    if (periodStatus === 'closed' && lastKnownQuarter !== null && currentQ !== lastKnownQuarter)
      renderAlert([], '', true, lastKnownQuarter, false);
    lastKnownQuarter = currentQ;

    const allPlays = [];
    for (const p of periods)
      for (const ev of (p.events || []))
        allPlays.push({ ...ev, quarter: p.number || p.id });

    const newPlays = allPlays.slice(totalPlaysProcessed);
    for (const play of newPlays) {
      const pid = play.id || play.sequence || `${play.quarter}_${play.clock}_${play.description}`;
      if (seenPlayIds.has(pid)) continue;
      seenPlayIds.add(pid);
      const triggers = evaluatePlay(play);
      if (triggers.length > 0) renderAlert(triggers, play.description || '', false, 0, false);
    }
    totalPlaysProcessed = allPlays.length;

  } catch(err) {
    showError('Connection error: ' + err.message);
    setStatus('error');
  }
}

function showError(msg) { document.getElementById('err-area').innerHTML = `<div class="err-banner">${msg}</div>`; }
function clearError() { document.getElementById('err-area').innerHTML = ''; }

async function boot() {
  await new Promise(r => setTimeout(r, 1200));
  showApp();
  setStatus('connecting');
  await pollGame();
  setInterval(pollGame, POLL_MS);
}

boot();
</script>
</body>
</html>
